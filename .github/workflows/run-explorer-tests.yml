name: Run Neighborhood Explorer tests

on:
  workflow_dispatch:
    inputs:
      count:
        description: How many addresses (1-1000). Use 1-2 for a quick sanity check.
        type: number
        default: 2
      headless:
        description: Run browser headless
        type: boolean
        default: true
      skip_login_check:
        description: Expert only — allow missing login secrets (each test ~2 min, mostly failures)
        type: boolean
        default: false

jobs:
  explore:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Require staging login secrets (read docs/START-HERE.md)
        if: ${{ github.event.inputs.skip_login_check != 'true' }}
        env:
          DREAM_NEIGHBORHOOD_EMAIL: ${{ secrets.DREAM_NEIGHBORHOOD_EMAIL }}
          DREAM_NEIGHBORHOOD_PASSWORD: ${{ secrets.DREAM_NEIGHBORHOOD_PASSWORD }}
        run: |
          if [ -z "$DREAM_NEIGHBORHOOD_EMAIL" ] || [ -z "$DREAM_NEIGHBORHOOD_PASSWORD" ]; then
            echo "::error::Missing secrets. Add BOTH: DREAM_NEIGHBORHOOD_EMAIL and DREAM_NEIGHBORHOOD_PASSWORD"
            echo "Where: Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Why: Without them staging shows sign-in; each test waits ~2 minutes. See docs/START-HERE.md"
            exit 1
          fi
          echo "Login secrets present. Run should be much faster than without them."

      - name: Validate count is 1-1000
        run: |
          C='${{ github.event.inputs.count }}'
          case "$C" in
            ''|*[!0-9]*) echo "::error::count must be a number"; exit 1 ;;
          esac
          if [ "$C" -lt 1 ] || [ "$C" -gt 1000 ]; then
            echo "::error::count must be between 1 and 1000 (got $C)"
            exit 1
          fi
          echo "OK: count=$C"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps and Playwright Chromium
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run explorer tests
        env:
          PYTHONUNBUFFERED: "1"
          DREAM_NEIGHBORHOOD_EMAIL: ${{ secrets.DREAM_NEIGHBORHOOD_EMAIL }}
          DREAM_NEIGHBORHOOD_PASSWORD: ${{ secrets.DREAM_NEIGHBORHOOD_PASSWORD }}
        run: |
          python text/test_neighborhood_explorer.py \
            --count ${{ github.event.inputs.count }} \
            --headless ${{ github.event.inputs.headless }} \
            --output results-ci.json

      - name: Stage files for artifact
        run: |
          mkdir -p out
          cp results-ci.json out/results.json
          cp results-ci.json dashboard/results.json

      - uses: actions/upload-artifact@v4
        with:
          name: explorer-results
          if-no-files-found: error
          path: |
            out/results.json
            dashboard/results.json
